AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: NetMCP - API Gateway + Lambda + DynamoDB

Parameters:
  FrontendUrl:
    Type: String
    Description: Frontend URL (e.g. your app) for MCP tools - set when deploying
  BackendUrl:
    Type: String
    Description: Backend/API base URL (e.g. Supabase) - set when deploying

Resources:
  NetMCPTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: netmcp-requests
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  NetMCPFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../mcp-server/
      Handler: main.handler
      Runtime: python3.10
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          DYNAMO_TABLE: !Ref NetMCPTable
          STORAGE_BACKEND: dynamodb
          FRONTEND_URL: !Ref FrontendUrl
          BACKEND_URL: !Ref BackendUrl
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NetMCPTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: Api
          Properties:
            Path: /
            Method: ANY

Outputs:
  NetMCPApiUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
    Export:
      Name: NetMCPApiUrl
  NetMCPTableName:
    Description: DynamoDB table name
    Value: !Ref NetMCPTable
    Export:
      Name: NetMCPTableName
