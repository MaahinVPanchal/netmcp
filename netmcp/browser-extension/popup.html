<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NetMCP</title>
  <style>
    body {
      width: 340px;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
    }
    h2 { margin: 0 0 8px; font-size: 14px; }
    label { display: block; margin-top: 8px; color: #555; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 12px;
      padding: 8px 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .hint { font-size: 11px; color: #888; margin-top: 4px; }
    .goal { font-size: 11px; color: #0c5; margin-top: 6px; }
  </style>
</head>
<body>
  <h2>NetMCP</h2>
  <p>NetMCP server URL (where logs are sent). Use your deployed NetMCP base URL.</p>
  <label>NetMCP server URL</label>
  <input type="url" id="ingestBaseUrl" placeholder="https://your-netmcp.com or http://localhost:8000" />
  <div class="hint">No trailing slash. Ingest: /ingest</div>
  <div class="goal">On <b>voicezero.ai</b>: open DevTools → Network. All requests (including to Supabase) are sent here so MCP can list endpoints.</div>
  <button id="save">Save</button>
  <script src="popup.js"></script>
</body>
</html>
